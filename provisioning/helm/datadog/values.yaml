# Overrides for the upstream `datadog` subchart (see Chart.yaml dependency).
# Everything is nested under the `datadog:` key because that is the dependency
# name; the chart's own top-level `datadog`/`clusterAgent`/`agents` keys live
# one level down.
datadog:
  datadog:
    site: datadoghq.eu
    clusterName: senaev-k3s

    apiKeyExistingSecret: senaev-com-kv-secrets

    # --- K3s specifics ---
    # K3s kubelet serves a self-signed cert over the node IP; the agent cannot
    # verify it (sets DD_KUBELET_TLS_VERIFY=false).
    kubelet:
      tlsVerify: false
    # K3s embeds containerd at a non-standard socket path.
    criSocketPath: /run/k3s/containerd/containerd.sock

    # --- Kubernetes insights / infra metrics ---
    kubeStateMetricsCore:
      enabled: true
    orchestratorExplorer:
      enabled: true

    # --- LOGS (priority) ---
    # The node Agent tails /var/log/pods on its own node, so log collection is
    # node-local: with the DaemonSet pinned to particular nodes (see the
    # `agents` affinity below), these settings collect logs from every container
    # on those nodes. Cluster-wide K8s resource insights (pods/nodes on all
    # VPSes) still come from the Cluster Agent via orchestratorExplorer.
    logs:
      enabled: true
      containerCollectAll: true
      containerCollectUsingFiles: true

    # --- Live processes + live containers ---
    processAgent:
      processCollection: true

    # --- APM / Traces ---
    # Single Step Instrumentation: the admission controller injects dd-trace
    # libraries automatically into matching pods without code changes.
    tags:
      - "env:prod"
    apm:
      portEnabled: true
      instrumentation:
        enabled: true
        # Scope injection to the app namespace. Without this the handler skips
        # all namespaces even though the /injectlib webhook fires cluster-wide.
        # Note: targets and enabledNamespaces are mutually exclusive in the
        # chart schema; use enabledNamespaces + default library versions.
        enabledNamespaces:
          - senaev-com

    dogstatsd:
      useHostPort: true
      nonLocalTraffic: true
    operator:
      enabled: false

  # Cluster Agent: required for orchestratorExplorer, KSM core and cluster
  # checks. Pinned to the control plane, matching the existing operator-pinning
  # convention (vault, vm-operator).
  clusterAgent:
    enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    nodeSelector:
      vps: hetzner
    env:
      - name: DD_API_KEY_STAGING
        valueFrom:
          secretKeyRef:
            name: senaev-com-kv-secrets
            key: api-key-staging
      - name: DD_ADDITIONAL_ENDPOINTS
        value: '{"https://app.datad0g.com": ["$(DD_API_KEY_STAGING)"]}'
      - name: DD_ORCHESTRATOR_EXPLORER_ORCHESTRATOR_ADDITIONAL_ENDPOINTS
        value: '{"https://orchestrator.datad0g.com": ["$(DD_API_KEY_STAGING)"]}'

  # Node Agent DaemonSet: restricted to the media node and the control plane via
  # node affinity on the `vps` label. No taints exist today, but tolerate
  # everything defensively so future taints don't silently drop these nodes.
  agents:
    enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: vps
                  operator: In
                  values:
                    - senaev-media
                    - hetzner
    tolerations:
      - operator: Exists
    containers:
      agent:
        env:
          # Staging org API key — defined first so $(DD_API_KEY_STAGING) can be
          # interpolated by subsequent env vars via K8s variable substitution.
          - name: DD_API_KEY_STAGING
            valueFrom:
              secretKeyRef:
                name: senaev-com-kv-secrets
                key: api-key-staging
          - name: DD_ADDITIONAL_ENDPOINTS
            value: '{"https://app.datad0g.com": ["$(DD_API_KEY_STAGING)"]}'
          - name: DD_LOGS_CONFIG_USE_HTTP
            value: "true"
          - name: DD_LOGS_CONFIG_ADDITIONAL_ENDPOINTS
            value: '[{"api_key": "$(DD_API_KEY_STAGING)", "Host": "agent-http-intake.logs.datad0g.com", "Port": 443, "is_reliable": true}]'
      traceAgent:
        env:
          - name: DD_API_KEY_STAGING
            valueFrom:
              secretKeyRef:
                name: senaev-com-kv-secrets
                key: api-key-staging
          - name: DD_APM_ADDITIONAL_ENDPOINTS
            value: '{"https://trace.agent.datad0g.com": ["$(DD_API_KEY_STAGING)"]}'
          - name: DD_APM_PROFILING_ADDITIONAL_ENDPOINTS
            value: '{"https://intake.profile.datad0g.com/api/v2/profile": ["$(DD_API_KEY_STAGING)"]}'
      processAgent:
        env:
          - name: DD_API_KEY_STAGING
            valueFrom:
              secretKeyRef:
                name: senaev-com-kv-secrets
                key: api-key-staging
          - name: DD_PROCESS_ADDITIONAL_ENDPOINTS
            value: '{"https://process.datad0g.com": ["$(DD_API_KEY_STAGING)"]}'
