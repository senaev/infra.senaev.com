apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datadog-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: datadog-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: api-key
      remoteRef:
        key: senaev-com-kv
        property: DD_API_KEY
