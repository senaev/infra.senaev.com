testEcho:
  enabled: true
  vps: hetzner

minio:
  enabled: true
  vps: senaev-media
  rootUser: senaev_media_s3_admin
  volumePath: volumes/minio

# curl -u "admin_with_emoji_password:ñew 🆕 pAsSw⭕️rd" https://test.senaev.com/test-elasticsearch/my-index/_search
elasticsearch:
  enabled: false
  vps: hetzner
  elasticPassword: "bootstrap_elastic_password"
  customPassword: "ñew 🆕 pAsSw⭕️rd"
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 2Gi

ingress:
  entries:
    - name: test-direct
      className: traefik-hetzner
      hosts:
        - host: test.senaev.com
          service: test-echo
          port: 80
    - name: test-minio
      className: traefik-hetzner
      hosts:
        - host: test-s3-bucket.senaev.com
          service: minio
          port: 9000
    - name: test-minio-console
      className: traefik-hetzner
      hosts:
        - host: test-s3-bucket-console.senaev.com
          service: minio
          port: 9001
