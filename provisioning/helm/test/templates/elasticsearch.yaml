{{- if .Values.elasticsearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: {{ .Release.Namespace }}
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      nodeSelector:
        vps: {{ .Values.elasticsearch.vps }}
      initContainers:
        - name: configure-vm-max-map-count
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: ELASTIC_PASSWORD
              value: {{ .Values.elasticsearch.elasticPassword | quote }}
            - name: ES_CUSTOM_PASSWORD
              value: {{ .Values.elasticsearch.customPassword | quote }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until curl -sf -u "elastic:${ELASTIC_PASSWORD}" http://localhost:9200 >/dev/null 2>&1; do
                      sleep 3
                    done
                    curl -sf -X PUT \
                      -u "elastic:${ELASTIC_PASSWORD}" \
                      -H "Content-Type: application/json" \
                      "http://localhost:9200/_security/user/admin_with_emoji_password" \
                      -d "{\"password\":\"${ES_CUSTOM_PASSWORD}\",\"roles\":[\"superuser\"]}" \
                      || true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'curl -sf -u "elastic:${ELASTIC_PASSWORD}" http://localhost:9200/_cluster/health'
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: {{ .Values.elasticsearch.resources.requests.cpu }}
              memory: {{ .Values.elasticsearch.resources.requests.memory }}
            limits:
              memory: {{ .Values.elasticsearch.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
{{- end }}
