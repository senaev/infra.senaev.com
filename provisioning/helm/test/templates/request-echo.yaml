{{- if .Values.requestEcho.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-echo
  namespace: {{ .Release.Namespace }}
  labels:
    app: request-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-echo
  template:
    metadata:
      labels:
        app: request-echo
    spec:
      nodeSelector:
        vps: {{ .Values.requestEcho.vps }}
      containers:
        - name: request-echo
          image: ghcr.io/mendhak/http-https-echo:41
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: request-echo
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: request-echo
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
