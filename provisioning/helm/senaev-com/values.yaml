# TODO: Remove duplications using helmfile
clusterRootPath: /k3s-cluster

nextjs:
  enabled: true
  vps: hetzner

webdavSenaevCom:
  enabled: true
  volumePath: volumes/webdav
  vps: hetzner

webdavSenaevRu:
  enabled: true
  vps: yc

xrayVpn:
  enabled: true
  instances:
    - name: xray-vpn-yc
      vps: yc
      serverName: senaev.ru
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:1}"
          outbound: outbound-hetzner
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:2}"
          outbound: outbound-freedom
    - name: xray-vpn-hetzner
      vps: hetzner
      serverName: senaev.com
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:3}"
          outbound: outbound-yc
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:4}"
          outbound: outbound-freedom

qbittorrent:
  enabled: true
  volumePath: volumes/qbittorrent
  vps: yc
  webuiPort: 9001
  torrentPort: 6881
  paths:
    complete: /downloads/complete
    incomplete: /downloads/incomplete
    watch: /downloads/watch-torrent-files
    archiveTorrents: /downloads/archive-torrent-files
    convertedForMobile: /downloads/converted-for-mobile

filebrowser:
  enabled: true
  vps: yc
  volumePath: volumes/filebrowser/config

unmanic:
  enabled: true
  vps: yc
  volumePath: volumes/unmanic

jellyfin:
  enabled: true
  volumePath: volumes/jellyfin
  vps: yc
  webuiPort: 8096

testEcho:
  enabled: true
  vps: hetzner

clusterHelper:
  enabled: true
  vps: hetzner

mediaServerHelper:
  enabled: true
  vps: yc
  percentTriggerToRemove: 80
  percentRemoveTarget: 79

telegramWebhookEndpoint:
  enabled: true
  vps: hetzner
  webhookDomain: telegram-webhook-endpoint.senaev.com

vpnSubscription:
  enabled: true
  entries:
    - name: "рџ‡©рџ‡Є senaev.ruрџ’»yc в†’ socksрџЊђhetzner"
      link: "vless://{XRAY_USER_UUID:1}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "рџ‡·рџ‡є senaev.ruрџ’»yc в†’ freedomрџЊђyc"
      link: "vless://{XRAY_USER_UUID:2}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "рџ‡·рџ‡є senaev.comрџ’»hetzner в†’ socksрџЊђyc"
      link: "vless://{XRAY_USER_UUID:3}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "рџ‡©рџ‡Є senaev.comрџ’»hetzner в†’ freedomрџЊђhetzner"
      link: "vless://{XRAY_USER_UUID:4}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
  vps: hetzner

redpandaConsole:
  enabled: true
  vps: hetzner

ingress:
  entries:
    - name: senaev-com
      className: traefik-hetzner
      hosts:
        - host: senaev.com
          service: nextjs-app
          port: 3000
        - host: webdav.senaev.com
          service: webdav-senaev-com
          port: 80
        - host: test.senaev.com
          service: test-echo
          port: 80
        - host: qbittorrent.senaev.com
          service: qbittorrent
          port: 9001
        - host: filebrowser.senaev.com
          service: filebrowser
          port: 8080
        - host: jellyfin.senaev.com
          service: jellyfin
          port: 8096
        - host: telegram-webhook-endpoint.senaev.com
          service: telegram-webhook-endpoint
          port: 3000
        - host: vpn-subscription.senaev.com
          service: vpn-subscription
          port: 3000
        - host: senaev.ru
          service: nextjs-app
          port: 3000
        - host: webdav.senaev.ru
          service: webdav-senaev-ru
          port: 80
    - name: senaev-com-unmanic
      className: traefik-hetzner
      middleware: unmanic-basicauth
      hosts:
        - host: unmanic.senaev.com
          service: unmanic
          port: 8888
    - name: senaev-com-redpanda-console
      className: traefik-hetzner
      middleware: redpanda-console-basicauth
      hosts:
        - host: kafka.senaev.com
          service: redpanda-console
          port: 8080
