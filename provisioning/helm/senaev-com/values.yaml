clusterRootPath: /k3s-cluster
mediaServerStoragePath: /mnt/sdb1

nextjs:
  enabled: true
  vps: hetzner
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

webdavSenaevCom:
  enabled: true
  volumePath: volumes/webdav
  vps: hetzner
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

webdavSenaevRu:
  enabled: true
  vps: senaev-media
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

xrayVpn:
  enabled: true
  instances:
    - name: xray-vpn-ru
      vps: ru
      serverName: senaev.ru
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:1}"
          outbound: outbound-hetzner
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:2}"
          outbound: outbound-freedom
    - name: xray-vpn-hetzner
      vps: hetzner
      serverName: senaev.com
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:3}"
          outbound: outbound-ru
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:4}"
          outbound: outbound-freedom

qbittorrent:
  enabled: true
  volumePath: volumes/qbittorrent
  vps: senaev-media
  webuiPort: 9001
  torrentPort: 6881
  paths:
    complete: /downloads/complete
    incomplete: /downloads/incomplete
    watch: /downloads/watch-torrent-files
    archiveTorrents: /downloads/archive-torrent-files
    convertedForMobile: /downloads/converted-for-mobile

filebrowser:
  enabled: true
  vps: senaev-media
  volumePath: volumes/filebrowser/config
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

unmanic:
  enabled: true
  vps: senaev-media
  volumePath: volumes/unmanic
  resources:
    requests:
      cpu: 512m
      memory: 512Mi
    limits:
      cpu: 2048m
      memory: 2Gi

jellyfin:
  enabled: true
  volumePath: volumes/jellyfin
  vps: senaev-media
  webuiPort: 8096

testEcho:
  enabled: true
  vps: hetzner

clusterHelper:
  enabled: true
  vps: hetzner

mediaServerHelper:
  enabled: true
  vps: senaev-media
  percentTriggerToRemove: 98
  percentRemoveTarget: 95

webhookEndpoint:
  enabled: true
  vps: hetzner
  webhookDomain: webhook-endpoint.senaev.com

vpnSubscription:
  enabled: true
  vps: hetzner
  entries:
    - name: "🇩🇪 1. senaev.ru💻ru → socks🌐hetzner"
      link: "vless://{XRAY_USER_UUID:1}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇷🇺 2. senaev.ru💻ru → freedom🌐ru"
      link: "vless://{XRAY_USER_UUID:2}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇷🇺 3. senaev.com💻hetzner → socks🌐ru"
      link: "vless://{XRAY_USER_UUID:3}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇩🇪 4. senaev.com💻hetzner → freedom🌐hetzner"
      link: "vless://{XRAY_USER_UUID:4}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="

redpandaConsole:
  enabled: true
  vps: hetzner

ingress:
  entries:
    - name: senaev-com-direct
      className: traefik-hetzner
      hosts:
        - host: webdav.senaev.com
          service: webdav-senaev-com
          port: 80
        - host: test.senaev.com
          service: test-echo
          port: 80
        - host: qbittorrent.senaev.com
          service: qbittorrent
          port: 9001
        - host: filebrowser.senaev.com
          service: filebrowser
          port: 8080
        - host: jellyfin.senaev.com
          service: jellyfin
          port: 8096
        - host: webhook-endpoint.senaev.com
          service: webhook-endpoint
          port: 3000
        - host: vpn-subscription.senaev.com
          service: vpn-subscription
          port: 3000
    - name: senaev-com-xray-fallback
      className: traefik-hetzner
      entrypoints: websecure-xray
      hosts:
        - host: senaev.com
          service: nextjs-app
          port: 3000
    - name: senaev-ru-direct
      className: traefik-ru
      hosts:
        - host: webdav.senaev.ru
          service: webdav-senaev-ru
          port: 80
    - name: senaev-ru-xray-fallback
      className: traefik-ru
      entrypoints: websecure-xray
      hosts:
        - host: senaev.ru
          service: nextjs-app
          port: 3000
    - name: senaev-com-unmanic
      className: traefik-hetzner
      middleware: unmanic-basicauth
      hosts:
        - host: unmanic.senaev.com
          service: unmanic
          port: 8888
    - name: senaev-com-redpanda-console
      className: traefik-hetzner
      middleware: redpanda-console-basicauth
      hosts:
        - host: kafka.senaev.com
          service: redpanda-console
          port: 8080
