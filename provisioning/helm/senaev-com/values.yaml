clusterRootPath: /k3s-cluster
mediaServerStoragePath: /mnt/sdb1

nextjs:
  enabled: true
  vps: hetzner
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

webdavSenaevCom:
  enabled: true
  volumePath: volumes/webdav
  vps: hetzner

webdavSenaevRu:
  enabled: true
  vps: senaev-media

xrayVpn:
  enabled: true
  instances:
    - name: xray-vpn-firstvds
      vps: firstvds
      realityServerName: senaev.ru
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:1}"
          outbound: outbound-hetzner
        - user: user-socks-vultr
          uuidMacro: "{XRAY_USER_UUID:6}"
          outbound: outbound-vultr
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:4}"
          outbound: outbound-freedom
    - name: xray-vpn-hetzner
      vps: hetzner
      realityServerName: senaev.com
      profiles:
        - user: user-socks
          uuidMacro: "{XRAY_USER_UUID:2}"
          outbound: outbound-firstvds
        - user: user-socks-senaev-media
          uuidMacro: "{XRAY_USER_UUID:3}"
          outbound: outbound-senaev-media
        - user: user-freedom
          uuidMacro: "{XRAY_USER_UUID:5}"
          outbound: outbound-freedom
    - name: xray-vpn-senaev-media
      vps: senaev-media
      profiles: []
    - name: xray-vpn-vultr
      vps: vultr
      profiles: []

qbittorrent:
  enabled: true
  volumePath: volumes/qbittorrent
  vps: senaev-media
  webuiUsername: qbittorrent_admin
  webuiPort: 9001
  torrentPort: 6881
  paths:
    completed: /downloads/completed
    incomplete: /downloads/incomplete
    watch: /downloads/watch-torrent-files
    archiveTorrents: /downloads/archive-torrent-files
    convertedForMobile: /downloads/converted-for-mobile
    neverRemove: /never_remove

filebrowser:
  enabled: true
  vps: senaev-media
  volumePath: volumes/filebrowser/config
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

unmanic:
  enabled: true
  vps: senaev-media
  volumePath: volumes/unmanic
  resources:
    requests:
      cpu: 512m
      memory: 512Mi
    limits:
      cpu: 2048m
      memory: 2Gi

prowlarr:
  enabled: true
  vps: hetzner
  volumePath: volumes/prowlarr
  webuiPort: 9696
  qbittorrent:
    category: prowlarr
  flaresolverr:
    enabled: true
    port: 8191
    logLevel: warning
    tag: flaresolverr
    requestTimeoutSeconds: 180
  secretEnv:
    - name: PROWLARR_KINOZAL_PASSWORD
      secretKey: PROWLARR_KINOZAL_PASSWORD
    - name: PROWLARR_RUTRACKER_PASSWORD
      secretKey: PROWLARR_RUTRACKER_PASSWORD
  # Use this script to import indexers
  # kubectl -n senaev-com exec deploy/prowlarr -c qbittorrent-download-client-configurer -- python /scripts/export-indexers.py
  indexers:
    - name: "Kinozal"
      implementation: "Cardigann"
      enable: true
      protocol: "torrent"
      priority: 25
      appProfileId: 1
      fields:
        - name: "definitionFile"
          value: "kinozal"
        - name: "baseUrl"
          value: "https://kinozal.tv/"
        - name: "baseSettings.limitsUnit"
          value: 0
        - name: "torrentBaseSettings.preferMagnetUrl"
          value: false
        - name: "username"
          value: "sacryfice"
        - name: "password"
          valueFromEnv: PROWLARR_KINOZAL_PASSWORD
        - name: "freeleech"
          value: false
        - name: "stripcyrillic"
          value: true
        - name: "addrussian"
          value: true
        - name: "sort"
          value: 0
        - name: "type"
          value: 0
        - name: "info_torrent"
          value: "This tracker limits the number of torrents a user can download each day without paying. This indexer uses <b>torrent files</b> with the user's passkey, so any download/upload is recorded. If you receive errors when downloading torrent files, you may have reached this limit. To bypass the limit with magnet links, use <b>Kinozal (M)</b>."
    - name: "RuTracker"
      implementation: "RuTracker"
      enable: true
      protocol: "torrent"
      priority: 25
      appProfileId: 1
      fields:
        - name: "baseUrl"
          value: "https://rutracker.net/"
        - name: "username"
          value: "senaev"
        - name: "password"
          valueFromEnv: PROWLARR_RUTRACKER_PASSWORD
        - name: "russianLetters"
          value: false
        - name: "useMagnetLinks"
          value: false
        - name: "addRussianToTitle"
          value: false
        - name: "moveFirstTagsToEndOfReleaseTitle"
          value: false
        - name: "moveAllTagsToEndOfReleaseTitle"
          value: false
        - name: "baseSettings.limitsUnit"
          value: 0
        - name: "torrentBaseSettings.preferMagnetUrl"
          value: false

jellyfin:
  enabled: true
  volumePath: volumes/jellyfin
  vps: senaev-media
  webuiPort: 8096

testEcho:
  enabled: true
  vps: hetzner

clusterHelper:
  enabled: true
  vps: hetzner

mediaServerHelper:
  enabled: true
  vps: senaev-media
  percentTriggerToRemove: 98
  percentRemoveTarget: 95

webhookEndpoint:
  enabled: true
  vps: hetzner
  webhookDomain: webhook-endpoint.senaev.com
  torrentOutboxVolumePath: volumes/webhook-endpoint/torrent-outbox

obsidianSync:
  enabled: true
  vps: hetzner
  volumePath: volumes/obsidian-sync/vault

obsidianOpencode:
  enabled: true
  vps: hetzner
  modelProvider: openrouter
  modelId: anthropic/claude-sonnet-4.6


vpnSubscription:
  enabled: true
  vps: hetzner
  entries:
    - name: "💄 0. firstvds → freedom"
      link: "vless://{XRAY_USER_UUID:4}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇳🇱 1. firstvds → vultr"
      link: "vless://{XRAY_USER_UUID:6}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇫🇮 2. firstvds → hetzner"
      link: "vless://{XRAY_USER_UUID:1}@senaev.ru:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.ru&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇷🇺 3. hetzner → firstvds"
      link: "vless://{XRAY_USER_UUID:2}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "🇷🇺 4. hetzner → senaev-media"
      link: "vless://{XRAY_USER_UUID:3}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="
    - name: "💄 5. hetzner → freedom"
      link: "vless://{XRAY_USER_UUID:5}@senaev.com:443?flow=xtls-rprx-vision&type=tcp&headerType=none&security=reality&fp=chrome&sni=senaev.com&pbk={XRAY_REALITY_PUBLIC_KEY}&sid="

ingress:
  entries:
    - name: senaev-com-direct
      className: traefik-hetzner
      hosts:
        - host: webdav.senaev.com
          service: webdav-senaev-com
          port: 80
        - host: test.senaev.com
          service: test-echo
          port: 80
        - host: qbittorrent.senaev.com
          service: qbittorrent
          port: 9001
        - host: filebrowser.senaev.com
          service: filebrowser
          port: 8080
        - host: jellyfin.senaev.com
          service: jellyfin
          port: 8096
        - host: webhook-endpoint.senaev.com
          service: webhook-endpoint
          port: 3000
        - host: vpn-subscription.senaev.com
          service: vpn-subscription
          port: 3000
    - name: senaev-com-xray-fallback
      className: traefik-hetzner
      entrypoints: websecure-xray
      hosts:
        - host: senaev.com
          service: nextjs-app
          port: 3000
    - name: senaev-ru-direct
      className: traefik-firstvds
      hosts:
        - host: webdav.senaev.ru
          service: webdav-senaev-ru
          port: 80
        - host: jellyfin.senaev.ru
          service: jellyfin
          port: 8096
        - host: qbittorrent.senaev.ru
          service: qbittorrent
          port: 9001
        - host: filebrowser.senaev.ru
          service: filebrowser
          port: 8080
    - name: senaev-ru-xray-fallback
      className: traefik-firstvds
      entrypoints: websecure-xray
      hosts:
        - host: senaev.ru
          service: nextjs-app
          port: 3000
    - name: senaev-com-unmanic
      className: traefik-hetzner
      middleware: unmanic-basicauth
      hosts:
        - host: unmanic.senaev.com
          service: unmanic
          port: 8888
    - name: senaev-ru-unmanic
      className: traefik-firstvds
      middleware: unmanic-basicauth
      hosts:
        - host: unmanic.senaev.ru
          service: unmanic
          port: 8888
    - name: senaev-com-prowlarr
      className: traefik-hetzner
      middleware: prowlarr-basicauth
      hosts:
        - host: prowlarr.senaev.com
          service: prowlarr
          port: 9696
    - name: senaev-ru-prowlarr
      className: traefik-firstvds
      middleware: prowlarr-basicauth
      hosts:
        - host: prowlarr.senaev.ru
          service: prowlarr
          port: 9696
