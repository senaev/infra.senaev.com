{{- if .Values.obsidianOpencode.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-opencode
  namespace: {{ .Release.Namespace }}
  labels:
    app: obsidian-opencode
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian-opencode
  template:
    metadata:
      labels:
        app: obsidian-opencode
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.obsidianOpencode.vps }}
      initContainers:
        - name: seed-another-project
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              mkdir -p /projects/another-project
              if [ ! -f /projects/another-project/README.md ]; then
                echo "# Another Project\n\nThis is a mock project." > /projects/another-project/README.md
              fi
          volumeMounts:
            - name: another-project
              mountPath: /projects/another-project
      containers:
        - name: opencode-serve
          image: ghcr.io/senaev/opencode-serve:latest
          env:
            - name: OPENCODE_WORKDIR
              value: /projects/vault
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OPENROUTER_API_KEY
                  optional: false
            - name: OPENCODE_CONFIG_CONTENT
              value: '{"model":"openrouter/{{ .Values.obsidianOpencode.modelId }}","provider":{"openrouter":{"npm":"@ai-sdk/openai-compatible","name":"OpenRouter","options":{"baseURL":"https://openrouter.ai/api/v1","apiKey":"{env:OPENROUTER_API_KEY}"}}}}'
          volumeMounts:
            - name: vault
              mountPath: /projects/vault
            - name: another-project
              mountPath: /projects/another-project

        - name: opencode-telegram-bot
          image: ghcr.io/senaev/opencode-telegram-bot:latest
          workingDir: /projects/vault
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_TOKEN_SENAEV_OBSIDIAN_SYNC_BOT
                  optional: false
            - name: TELEGRAM_ALLOWED_USER_ID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_SENAEV_USER_ID
                  optional: false
            - name: OPENCODE_API_URL
              value: "http://localhost:4096"
            - name: OPENCODE_MODEL_PROVIDER
              value: {{ .Values.obsidianOpencode.modelProvider }}
            - name: OPENCODE_MODEL_ID
              value: {{ .Values.obsidianOpencode.modelId }}
            - name: OPEN_BROWSER_ROOTS
              value: /projects

      volumes:
        - name: vault
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.obsidianSync.volumePath }}
            type: DirectoryOrCreate
        - name: another-project
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.obsidianOpencode.anotherProjectPath }}
            type: DirectoryOrCreate
{{- end }}
