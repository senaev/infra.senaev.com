{{- if .Values.opencodeTelegram.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-telegram-config
  namespace: {{ .Release.Namespace }}
data:
  AGENTS.md: |
{{ .Files.Get "config/opencode-telegram/AGENTS.md" | indent 4 }}
  CLAUDE.md: |
{{ .Files.Get "config/opencode-telegram/CLAUDE.md" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-telegram
  namespace: {{ .Release.Namespace }}
  labels:
    app: opencode-telegram
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode-telegram
  template:
    metadata:
      labels:
        app: opencode-telegram
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.opencodeTelegram.vps }}
      initContainers:
        - name: git-init
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
              args:
                - |
                  git config --global user.name "Andrei Senaev"
                  git config --global user.email "andrei.senaev@gmail.com"
                  mkdir -p /root/.ssh
              cp /tmp/ssh/id_rsa /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              ssh-keyscan github.com >> /root/.ssh/known_hosts 2>/dev/null
              mkdir -p /projects/git
          volumeMounts:
            - name: ssh-key
              mountPath: /tmp/ssh
              readOnly: true
            - name: ssh-dir
              mountPath: /root/.ssh
            - name: projects-git
              mountPath: /projects/git
      containers:
        - name: opencode-serve
          image: ghcr.io/senaev/opencode-serve:latest
          env:
            - name: GIT_AUTHOR_NAME
              value: Andrei Senaev
            - name: GIT_AUTHOR_EMAIL
              value: andrei.senaev@gmail.com
            - name: GIT_COMMITTER_NAME
              value: Andrei Senaev
            - name: GIT_COMMITTER_EMAIL
              value: andrei.senaev@gmail.com
            - name: OPENCODE_WORKDIR
              value: /projects/vault
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OPENROUTER_API_KEY
                  optional: false
            - name: OPENCODE_CONFIG_CONTENT
              value: '{"model":"openrouter/{{ .Values.opencodeTelegram.modelId }}","provider":{"openrouter":{"npm":"@ai-sdk/openai-compatible","name":"OpenRouter","options":{"baseURL":"https://openrouter.ai/api/v1","apiKey":"{env:OPENROUTER_API_KEY}"}}}}'
          volumeMounts:
            - name: vault
              mountPath: /projects/vault
            - name: projects-git
              mountPath: /projects/git
            - name: ssh-dir
              mountPath: /root/.ssh
            - name: opencode-data
              mountPath: /root/.local/share/opencode
              subPath: opencode-sessions
            - name: opencode-config
              mountPath: /AGENTS.md
              subPath: AGENTS.md
            - name: opencode-config
              mountPath: /CLAUDE.md
              subPath: CLAUDE.md

        - name: opencode-telegram-bot
          image: ghcr.io/senaev/opencode-telegram-bot:latest
          volumeMounts:
            - name: vault
              mountPath: /projects/vault
            - name: projects-git
              mountPath: /projects/git
            - name: opencode-data
              mountPath: /root/.config/opencode-telegram-bot
              subPath: telegram-bot
            - name: opencode-config
              mountPath: /AGENTS.md
              subPath: AGENTS.md
            - name: opencode-config
              mountPath: /CLAUDE.md
              subPath: CLAUDE.md
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_TOKEN_OPENCODE_SENAEV_BOT
                  optional: false
            - name: TELEGRAM_ALLOWED_USER_ID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_SENAEV_USER_ID
                  optional: false
            - name: OPENCODE_API_URL
              value: "http://localhost:4096"
            - name: OPENCODE_MODEL_PROVIDER
              value: {{ .Values.opencodeTelegram.modelProvider }}
            - name: OPENCODE_MODEL_ID
              value: {{ .Values.opencodeTelegram.modelId }}
            - name: OPEN_BROWSER_ROOTS
              value: /projects
            - name: STT_API_URL
              value: "https://api.groq.com/openai/v1"
            - name: STT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: GROQ_API_KEY
                  optional: false
            - name: STT_MODEL
              value: "whisper-large-v3-turbo"

      volumes:
        - name: vault
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.obsidianSync.volumePath }}
            type: DirectoryOrCreate
        - name: opencode-data
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.opencodeTelegram.opencodeDataPath }}
            type: DirectoryOrCreate
        - name: ssh-key
          secret:
            secretName: senaev-com-kv-secrets
            items:
              - key: TELEGRAM_OPENCODE_SSH_PRIVATE_KEY
                path: id_rsa
                mode: 0600
        - name: ssh-dir
          emptyDir: {}
        - name: projects-git
          persistentVolumeClaim:
            claimName: opencode-telegram-git
        - name: opencode-config
          configMap:
            name: opencode-telegram-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-telegram-git
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 16Gi
{{- end }}
