{{- if .Values.mediaServerHelper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server-helper
  namespace: {{ .Release.Namespace }}
  labels:
    app: media-server-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-server-helper
  template:
    metadata:
      labels:
        app: media-server-helper
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        vps: {{ .Values.mediaServerHelper.vps }}
      initContainers:
        - name: fix-watch-folder-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /watch-torrent-files
              mkdir -p /downloads/complete /downloads/converted-for-mobile
              chown -R 1000:1000 /watch-torrent-files /downloads
          volumeMounts:
            - name: watch-torrent-files
              mountPath: /watch-torrent-files
            - name: downloads-complete
              mountPath: /downloads/complete
            - name: downloads-converted-for-mobile
              mountPath: /downloads/converted-for-mobile
      containers:
        - name: media-server-helper
          image: ghcr.io/senaev/media-server-helper:latest
          env:
            - name: KAFKA_BROKERS
              value: redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.kafkaPort }}
            - name: PERCENT_TRIGGER_TO_REMOVE
              value: {{ .Values.mediaServerHelper.percentTriggerToRemove | quote }}
            - name: PERCENT_REMOVE_TARGET
              value: {{ .Values.mediaServerHelper.percentRemoveTarget | quote }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_TOKEN_SENAEV_COM_BOT
                  optional: false
            - name: TG_MEDIA_SERVER_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_MEDIA_SERVER_CHANNEL_ID
                  optional: false
          volumeMounts:
            - name: watch-torrent-files
              mountPath: /watch-torrent-files
            - name: downloads-complete
              mountPath: /downloads/complete
            - name: downloads-converted-for-mobile
              mountPath: /downloads/converted-for-mobile
      volumes:
        - name: watch-torrent-files
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.watch }}
            type: DirectoryOrCreate
        - name: downloads-complete
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.complete }}
            type: DirectoryOrCreate
        - name: downloads-converted-for-mobile
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.convertedForMobile }}
            type: DirectoryOrCreate
{{- end }}
