{{- if .Values.jellyfin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: {{ .Release.Namespace }}
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        supplementalGroups:
          - 44
          - 991
      nodeSelector:
        vps: {{ .Values.jellyfin.vps }}
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:10.11.6
          securityContext:
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: webui
              containerPort: {{ .Values.jellyfin.webuiPort }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: completed
              mountPath: /media/downloads/completed
            - name: never-remove
              mountPath: /media/downloads/never_remove
            - name: dri
              mountPath: /dev/dri
      volumes:
        - name: config
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.jellyfin.volumePath }}/config
            type: DirectoryOrCreate
        - name: completed
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.completed }}
            type: DirectoryOrCreate
        - name: never-remove
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.neverRemove }}
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: jellyfin
  ports:
    - name: webui
      port: {{ .Values.jellyfin.webuiPort }}
      targetPort: {{ .Values.jellyfin.webuiPort }}
{{- end }}
