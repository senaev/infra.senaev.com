{{- if .Values.xrayVpn.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: xray-vpn-config-template
  namespace: {{ .Release.Namespace }}
data:
  config.json: |
    {
      "log": {
        "loglevel": "warning"
      },
      "inbounds": [
        {
          "port": 443,
          "protocol": "vless",
          "settings": {
            "clients": [
              {
                "id": "{XRAY_USER_UUID:1}",
                "flow": "xtls-rprx-vision"
              }
            ],
            "decryption": "none"
          },
          "streamSettings": {
            "network": "tcp",
            "security": "reality",
            "realitySettings": {
              "dest": "traefik-hetzner.traefik.svc.cluster.local:443",
              "serverNames": ["senaev.ru"],
              "privateKey": "{XRAY_REALITY_PRIVATE_KEY}",
              "shortIds": [""]
            }
          }
        },
        {
          "port": 80,
          "protocol": "dokodemo-door",
          "settings": {
            "address": "traefik-hetzner.traefik.svc.cluster.local",
            "port": 80,
            "network": "tcp"
          }
        }
      ],
      "outbounds": [
        {
          "protocol": "socks",
          "settings": {
            "address": "xray-socks",
            "port": 1080
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray-vpn
  namespace: {{ .Release.Namespace }}
  labels:
    app: xray-vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xray-vpn
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: xray-vpn
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
        configmap.reloader.stakater.com/reload: "xray-vpn-config-template"
    spec:
      nodeSelector:
        vps: {{ .Values.xrayVpn.vps }}
      initContainers:
        - name: xray-vpn-config-subst
          image: node:22-alpine
          command:
            - sh
            - -c
            - |
              cat <<'EOF' >/tmp/render-config.mjs
              import { createHash } from "node:crypto";
              import { readFileSync, writeFileSync } from "node:fs";

              const macroValues = {
                XRAY_REALITY_PRIVATE_KEY: process.env.XRAY_REALITY_PRIVATE_KEY,
                XRAY_USER_UUID: process.env.XRAY_USER_UUID,
              };

              function deriveUuid(baseValue, seed) {
                const derivedSeed = createHash("sha256")
                  .update(`${baseValue}:${seed}`)
                  .digest("hex")
                  .substring(0, 32);

                return `${derivedSeed.substr(0, 8)}-${derivedSeed.substr(8, 4)}-${derivedSeed.substr(12, 4)}-${derivedSeed.substr(16, 4)}-${derivedSeed.substr(20)}`;
              }

              const template = readFileSync("/template/config.json", "utf8");
              const rendered = template.replace(/\{([A-Z0-9_]+)(?::([^}]*))?\}/g, (match, macroName, seed) => {
                if (macroName === "XRAY_USER_UUID" && seed !== undefined) {
                  return deriveUuid(macroValues.XRAY_USER_UUID, seed);
                }

                const replacement = macroValues[macroName];
                if (replacement === undefined) {
                  throw new Error(`Unsupported macro: ${match}`);
                }

                return replacement;
              });

              writeFileSync("/out/config.json", rendered);
              EOF
              node /tmp/render-config.mjs
          env:
            - name: XRAY_USER_UUID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_USER_UUID
                  optional: false
            - name: XRAY_REALITY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_REALITY_PRIVATE_KEY
                  optional: false
          volumeMounts:
            - name: xray-vpn-config-template
              mountPath: /template
              readOnly: true
            - name: xray-vpn-config
              mountPath: /out
      containers:
        - name: xray-vpn
          image: teddysun/xray:26.2.6
          ports:
            - containerPort: 443
              hostPort: 443
            - containerPort: 80
              hostPort: 80
          volumeMounts:
            - name: xray-vpn-config
              mountPath: /etc/xray
              readOnly: true
      volumes:
        - name: xray-vpn-config-template
          configMap:
            name: xray-vpn-config-template
        - name: xray-vpn-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: xray-vpn
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: xray-vpn
  ports:
    - port: 443
      targetPort: 443
{{- end }}
