{{- if .Values.xrayVpn.enabled }}
{{- $root := . }}
{{- range $instance := .Values.xrayVpn.instances }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $instance.name }}-config-template
  namespace: {{ $root.Release.Namespace }}
data:
  full-config.json: |
{{ include "senaev-com.xrayVpnConfig" (dict "root" $root "instance" $instance) | nindent 4 }}
  bootstrap-config.json: |
{{ include "senaev-com.xrayVpnBootstrapConfig" $root | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $instance.name }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app: {{ $instance.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $instance.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ $instance.name }}
      annotations:
        # TODO: did NOT restart automatically when secrets appeared
        # TODO: move xray closer to terraform
        # TODO: remove extra kafka topics and service code, maybe initialize redpanda with others
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
        configmap.reloader.stakater.com/reload: "{{ $instance.name }}-config-template"
    spec:
      nodeSelector:
        vps: {{ $instance.vps }}
      initContainers:
        - name: xray-vpn-config-subst
          image: node:22-alpine
          command:
            - sh
            - -c
            - |
              cat <<'EOF' >/tmp/render-config.mjs
              import { createHash } from "node:crypto";
              import { readFileSync, writeFileSync } from "node:fs";

              const macroValues = {
                XRAY_REALITY_PRIVATE_KEY: process.env.XRAY_REALITY_PRIVATE_KEY,
                XRAY_USER_UUID: process.env.XRAY_USER_UUID,
              };
              const hasSecrets = Boolean(
                macroValues.XRAY_REALITY_PRIVATE_KEY && macroValues.XRAY_USER_UUID,
              );

              function deriveUuid(baseValue, seed) {
                const derivedSeed = createHash("sha256")
                  .update(`${baseValue}:${seed}`)
                  .digest("hex")
                  .substring(0, 32);

                return `${derivedSeed.substr(0, 8)}-${derivedSeed.substr(8, 4)}-${derivedSeed.substr(12, 4)}-${derivedSeed.substr(16, 4)}-${derivedSeed.substr(20)}`;
              }

              const templatePath = hasSecrets
                ? "/template/full-config.json"
                : "/template/bootstrap-config.json";
              const template = readFileSync(templatePath, "utf8");
              if (!hasSecrets) {
                console.log("XRAY bootstrap mode: secrets not found, proxying 80/443 to Traefik");
                writeFileSync("/out/config.json", template);
                process.exit(0);
              }

              const rendered = template.replace(/\{([A-Z0-9_]+)(?::([^}]*))?\}/g, (match, macroName, seed) => {
                if (macroName === "XRAY_USER_UUID" && seed !== undefined) {
                  return deriveUuid(macroValues.XRAY_USER_UUID, seed);
                }

                const replacement = macroValues[macroName];
                if (replacement === undefined) {
                  throw new Error(`Unsupported macro: ${match}`);
                }

                return replacement;
              });

              writeFileSync("/out/config.json", rendered);
              EOF
              node /tmp/render-config.mjs
          env:
            - name: XRAY_USER_UUID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_USER_UUID
                  optional: true
            - name: XRAY_REALITY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_REALITY_PRIVATE_KEY
                  optional: true
          volumeMounts:
            - name: xray-vpn-config-template
              mountPath: /template
              readOnly: true
            - name: xray-vpn-config
              mountPath: /out
      containers:
        - name: xray-vpn
          image: teddysun/xray:26.2.6
          ports:
            - containerPort: 443
              hostPort: 443
            - containerPort: 80
              hostPort: 80
            - containerPort: 1080
          volumeMounts:
            - name: xray-vpn-config
              mountPath: /etc/xray
              readOnly: true
      volumes:
        - name: xray-vpn-config-template
          configMap:
            name: {{ $instance.name }}-config-template
        - name: xray-vpn-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $instance.name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ $instance.name }}
  ports:
    - name: socks
      port: 1080
      targetPort: 1080
---
{{- end }}
{{- end }}
