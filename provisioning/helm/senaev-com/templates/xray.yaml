{{- if .Values.xray.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: xray-config-template
  namespace: {{ .Release.Namespace }}
data:
  config.json: |
    {
      "log": {
        "loglevel": "debug"
      },
      "inbounds": [
        {
          "port": 443,
          "protocol": "vless",
          "settings": {
            "clients": [
              {
                "id": "{XRAY_USER_UUID}",
                "flow": "xtls-rprx-vision"
              }
            ],
            "decryption": "none"
          },
          "streamSettings": {
            "network": "tcp",
            "security": "reality",
            "realitySettings": {
              "dest": "www.google.com:443",
              "serverNames": ["www.google.com"],
              "privateKey": "{XRAY_REALITY_PRIVATE_KEY}",
              "shortIds": ["", "0123456789abcdef"]
            }
          },
          "sniffing": {
            "enabled": true,
            "destOverride": ["http", "tls", "quic"],
            "routeOnly": true
          }
        }
      ],
      "outbounds": [
        {
          "protocol": "freedom",
          "tag": "direct"
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray
  namespace: {{ .Release.Namespace }}
  labels:
    app: xray
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xray
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: xray
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.xray.vps }}
      initContainers:
        - name: xray-config-subst
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s/{XRAY_USER_UUID}/$XRAY_USER_UUID/g" /template/config.json | sed "s|{XRAY_REALITY_PRIVATE_KEY}|$XRAY_REALITY_PRIVATE_KEY|g" > /out/config.json
          env:
            - name: XRAY_USER_UUID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_USER_UUID
                  optional: false
            - name: XRAY_REALITY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: XRAY_REALITY_PRIVATE_KEY
                  optional: false
          volumeMounts:
            - name: config-template
              mountPath: /template
              readOnly: true
            - name: xray-config
              mountPath: /out
      containers:
        - name: xray
          image: teddysun/xray:26.2.6
          ports:
            - containerPort: 443
              hostPort: 443
          volumeMounts:
            - name: xray-config
              mountPath: /etc/xray
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: xray-config-template
        - name: xray-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: xray
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: xray
  ports:
    - port: 443
      targetPort: 443
{{- end }}
