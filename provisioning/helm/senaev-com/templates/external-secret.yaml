apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: senaev-com-kv-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: senaev-com-kv-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: WEBDAV_COM_PASSWORD
      remoteRef:
        key: senaev-com-kv
        property: WEBDAV_COM_PASSWORD
    - secretKey: WEBDAV_RU_PASSWORD
      remoteRef:
        key: senaev-com-kv
        property: WEBDAV_RU_PASSWORD
    - secretKey: XRAY_CONFIG
      remoteRef:
        key: senaev-com-kv
        property: XRAY_CONFIG
    - secretKey: TOKEN_senaev_com_bot
      remoteRef:
        key: senaev-com-kv
        property: TOKEN_senaev_com_bot
    - secretKey: TG_CHANNEL_ID
      remoteRef:
        key: senaev-com-kv
        property: TG_CHANNEL_ID
    - secretKey: FILEBROWSER_PASSWORD_HASH
      remoteRef:
        key: senaev-com-kv
        property: FILEBROWSER_PASSWORD_HASH
