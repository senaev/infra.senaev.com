{{- if .Values.qbittorrent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # hostPort 6881 is used; avoid two pods on same node — scale down old pod before creating new one
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        vps: {{ .Values.qbittorrent.vps }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /downloads/complete /downloads/incomplete /downloads/watch-torrent-files /downloads/archive-torrent-files /downloads/converted-for-mobile
              chown -R 1000:1000 /config /downloads
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent@sha256:6a7ffbfff04dd109bff37c474bfee00aa08dea5edb78c670439be3ed242b70fa
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: WEBUI_PORT
              value: "{{ .Values.qbittorrent.webuiPort }}"
            - name: TORRENTING_PORT
              value: "{{ .Values.qbittorrent.torrentPort }}"
          ports:
            - name: webui
              containerPort: {{ .Values.qbittorrent.webuiPort }} 
            - name: torrent-tcp
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
            - name: torrent-udp
              protocol: UDP
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}/config
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}/downloads
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: {{ .Values.qbittorrent.webuiPort }}
      targetPort: {{ .Values.qbittorrent.webuiPort }}
    - name: torrent-tcp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
    - name: torrent-udp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
      protocol: UDP
{{- end }}
