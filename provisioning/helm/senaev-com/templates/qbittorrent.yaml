{{- if .Values.qbittorrent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-default-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
data:
  qBittorrent.conf: |
{{ tpl (.Files.Get "config/qbittorrent/qBittorrent.conf") . | nindent 4 }}
  tg-notify.sh: |
{{ .Files.Get "config/qbittorrent/tg-notify.sh" | nindent 4 }}
  configure-webui-credentials.py: |
{{ .Files.Get "config/qbittorrent/configure-webui-credentials.py" | nindent 4 }}
  watched_folders.json: |
{{ tpl (.Files.Get "config/qbittorrent/watched_folders.json") . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
subjects:
  - kind: ServiceAccount
    name: qbittorrent-log-reader
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qbittorrent-log-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: qbittorrent
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
        configmap.reloader.stakater.com/reload: "qbittorrent-default-config"
    spec:
      serviceAccountName: qbittorrent-log-reader
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        vps: {{ .Values.qbittorrent.vps }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /config
              mkdir -p {{ .Values.qbittorrent.paths.completed }} {{ .Values.qbittorrent.paths.incomplete }} {{ .Values.qbittorrent.paths.watch }} {{ .Values.qbittorrent.paths.archiveTorrents }} {{ .Values.qbittorrent.paths.convertedForMobile }} {{ .Values.qbittorrent.paths.neverRemove }}
              chown -R 1000:1000 /config
              chown -R 1000:1000 /downloads {{ .Values.qbittorrent.paths.neverRemove }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: never-remove
              mountPath: {{ .Values.qbittorrent.paths.neverRemove }}
        - name: init-config
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              mkdir -p /config/qBittorrent
              cp /default-config/qBittorrent.conf /config/qBittorrent/
              cp /default-config/watched_folders.json /config/qBittorrent/
          volumeMounts:
            - name: config
              mountPath: /config
            - name: default-config
              mountPath: /default-config
              readOnly: true
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: WEBUI_PORT
              value: "{{ .Values.qbittorrent.webuiPort }}"
            - name: TORRENTING_PORT
              value: "{{ .Values.qbittorrent.torrentPort }}"
          ports:
            - name: webui
              containerPort: {{ .Values.qbittorrent.webuiPort }} 
            - name: torrent-tcp
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
            - name: torrent-udp
              protocol: UDP
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: never-remove
              mountPath: {{ .Values.qbittorrent.paths.neverRemove }}
            - name: tg-notify
              mountPath: /scripts/tg-notify.sh
              subPath: tg-notify.sh
              readOnly: true
        - name: webui-credentials-configurer
          image: python:3.13-alpine
          command:
            - python
            - /scripts/configure-webui-credentials.py
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: QBITTORRENT_WEBUI_PORT
              value: {{ .Values.qbittorrent.webuiPort | quote }}
            - name: QBITTORRENT_WEBUI_USERNAME
              value: {{ .Values.qbittorrent.webuiUsername | quote }}
            - name: QBITTORRENT_WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: QBITTORRENT_WEBUI_PASSWORD
                  optional: false
          volumeMounts:
            - name: configure-webui-credentials
              mountPath: /scripts/configure-webui-credentials.py
              subPath: configure-webui-credentials.py
              readOnly: true
            - name: credentials-config-state
              mountPath: /credentials-config-state
      volumes:
        - name: config
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}/config
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: qbittorrent-default-config
        - name: tg-notify
          configMap:
            name: qbittorrent-default-config
            items:
              - key: tg-notify.sh
                path: tg-notify.sh
                mode: 0755
        - name: configure-webui-credentials
          configMap:
            name: qbittorrent-default-config
            items:
              - key: configure-webui-credentials.py
                path: configure-webui-credentials.py
                mode: 0644
        - name: credentials-config-state
          emptyDir: {}
        - name: downloads
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}/downloads
            type: DirectoryOrCreate
        - name: never-remove
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}{{ .Values.qbittorrent.paths.neverRemove }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: {{ .Values.qbittorrent.webuiPort }}
      targetPort: {{ .Values.qbittorrent.webuiPort }}
    - name: torrent-tcp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
    - name: torrent-udp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
      protocol: UDP
{{- end }}
