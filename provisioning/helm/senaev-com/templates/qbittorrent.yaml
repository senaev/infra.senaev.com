{{- if .Values.qbittorrent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-default-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
data:
  qBittorrent.conf: |
{{ tpl (.Files.Get "config/qbittorrent/qBittorrent.conf") . | nindent 4 }}
  tg-notify.sh: |
{{ .Files.Get "config/qbittorrent/tg-notify.sh" | nindent 4 }}
  notify-webui-password.sh: |
    #!/bin/sh
    set -eu

    STATE_FILE="/password-notify-state/webui-password-sent"
    if [ -f "$STATE_FILE" ]; then
      tail -f /dev/null
    fi

    K8S_HOST="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
    SA_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
    CA_CERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    LOGS_URL="${K8S_HOST}/api/v1/namespaces/${POD_NAMESPACE}/pods/${POD_NAME}/log?container=qbittorrent"

    json_escape() {
      printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
    }

    attempt=0
    while [ "$attempt" -lt 120 ]; do
      LOGS="$(curl -fsS --cacert "$CA_CERT" -H "Authorization: Bearer $SA_TOKEN" "$LOGS_URL" || true)"
      PASSWORD="$(printf '%s\n' "$LOGS" | sed -n 's/.*temporary password is provided for this session: \(.*\)$/\1/p' | tail -n 1)"

      if [ -n "$PASSWORD" ]; then
        JSON="$(printf '{"records":[{"value":{"podName":"%s","password":"%s"}}]}' \
          "$(json_escape "$POD_NAME")" \
          "$(json_escape "$PASSWORD")")"

        curl -fsS -X POST redpanda/topics/qbittorrent-webui-password-topic \
          -H "Content-Type: application/vnd.kafka.json.v2+json" \
          -d "$JSON"

        touch "$STATE_FILE"
        echo "✅ qBittorrent WebUI temporary password published"
        tail -f /dev/null
      fi

      attempt=$((attempt + 1))
      sleep 5
    done

    echo "⚠️ qBittorrent WebUI temporary password was not found in pod logs"
    tail -f /dev/null
  watched_folders.json: |
{{ tpl (.Files.Get "config/qbittorrent/watched_folders.json") . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qbittorrent-log-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
subjects:
  - kind: ServiceAccount
    name: qbittorrent-log-reader
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qbittorrent-log-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      serviceAccountName: qbittorrent-log-reader
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        vps: {{ .Values.qbittorrent.vps }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /config
              mkdir -p {{ .Values.qbittorrent.paths.complete }} {{ .Values.qbittorrent.paths.incomplete }} {{ .Values.qbittorrent.paths.watch }} {{ .Values.qbittorrent.paths.archiveTorrents }} {{ .Values.qbittorrent.paths.convertedForMobile }}
              chown -R 1000:1000 /config
              chown -R 1000:1000 /downloads
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
        - name: init-config
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              mkdir -p /config/qBittorrent
              cp /default-config/qBittorrent.conf /config/qBittorrent/
              cp /default-config/watched_folders.json /config/qBittorrent/
          volumeMounts:
            - name: config
              mountPath: /config
            - name: default-config
              mountPath: /default-config
              readOnly: true
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: WEBUI_PORT
              value: "{{ .Values.qbittorrent.webuiPort }}"
            - name: TORRENTING_PORT
              value: "{{ .Values.qbittorrent.torrentPort }}"
          ports:
            - name: webui
              containerPort: {{ .Values.qbittorrent.webuiPort }} 
            - name: torrent-tcp
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
            - name: torrent-udp
              protocol: UDP
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
          resources:
{{ toYaml .Values.qbittorrent.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: tg-notify
              mountPath: /scripts/tg-notify.sh
              subPath: tg-notify.sh
              readOnly: true
        - name: webui-password-notifier
          image: curlimages/curl:8.12.1
          command:
            - sh
            - /scripts/notify-webui-password.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: notify-webui-password
              mountPath: /scripts/notify-webui-password.sh
              subPath: notify-webui-password.sh
              readOnly: true
            - name: password-notify-state
              mountPath: /password-notify-state
          resources:
{{ toYaml .Values.qbittorrent.notifierResources | indent 12 }}
      volumes:
        - name: config
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}/config
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: qbittorrent-default-config
        - name: tg-notify
          configMap:
            name: qbittorrent-default-config
            items:
              - key: tg-notify.sh
                path: tg-notify.sh
                mode: 0755
        - name: notify-webui-password
          configMap:
            name: qbittorrent-default-config
            items:
              - key: notify-webui-password.sh
                path: notify-webui-password.sh
                mode: 0755
        - name: password-notify-state
          emptyDir: {}
        - name: downloads
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}/downloads
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: {{ .Values.qbittorrent.webuiPort }}
      targetPort: {{ .Values.qbittorrent.webuiPort }}
    - name: torrent-tcp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
    - name: torrent-udp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
      protocol: UDP
{{- end }}
