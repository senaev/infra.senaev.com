{{- if .Values.qbittorrent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-default-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
data:
  qBittorrent.conf: |
{{ tpl (.Files.Get "config/qbittorrent/qBittorrent.conf") . | nindent 4 }}
  watched_folders.json: |
{{ tpl (.Files.Get "config/qbittorrent/watched_folders.json") . | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        vps: {{ .Values.qbittorrent.vps }}
      initContainers:
        - name: init-config
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              mkdir -p /config/qBittorrent
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                cp /default-config/qBittorrent.conf /config/qBittorrent/
                cp /default-config/watched_folders.json /config/qBittorrent/
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: default-config
              mountPath: /default-config
              readOnly: true
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.qbittorrent.paths.complete }} {{ .Values.qbittorrent.paths.incomplete }} {{ .Values.qbittorrent.paths.watch }} {{ .Values.qbittorrent.paths.archiveTorrents }} {{ .Values.qbittorrent.paths.convertedForMobile }}
              chown -R 1000:1000 /downloads
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: WEBUI_PORT
              value: "{{ .Values.qbittorrent.webuiPort }}"
            - name: TORRENTING_PORT
              value: "{{ .Values.qbittorrent.torrentPort }}"
          ports:
            - name: webui
              containerPort: {{ .Values.qbittorrent.webuiPort }} 
            - name: torrent-tcp
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
            - name: torrent-udp
              protocol: UDP
              containerPort: {{ .Values.qbittorrent.torrentPort }}
              hostPort: {{ .Values.qbittorrent.torrentPort }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: default-config
          configMap:
            name: qbittorrent-default-config
        - name: downloads
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.qbittorrent.volumePath }}/downloads
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: {{ .Values.qbittorrent.webuiPort }}
      targetPort: {{ .Values.qbittorrent.webuiPort }}
    - name: torrent-tcp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
    - name: torrent-udp
      port: {{ .Values.qbittorrent.torrentPort }}
      targetPort: {{ .Values.qbittorrent.torrentPort }}
      protocol: UDP
{{- end }}
