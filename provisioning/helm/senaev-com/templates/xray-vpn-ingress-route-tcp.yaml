{{- if .Values.xrayVpn.enabled }}
{{- range $instance := .Values.xrayVpn.instances }}
{{- if not (empty $instance.realityServerName) }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ $instance.name }}-passthrough
  namespace: {{ $.Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik-{{ $instance.vps }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`{{ $instance.realityServerName }}`)
      services:
        - name: {{ $instance.name }}
          port: 443
  tls:
    passthrough: true
{{- end }}
{{- end }}
{{- end }}
