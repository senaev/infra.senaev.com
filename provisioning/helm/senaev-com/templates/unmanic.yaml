{{- if .Values.unmanic.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unmanic-default-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: unmanic
data:
  settings.json: |
{{ tpl (.Files.Get "config/unmanic/settings.json") . | nindent 4 }}
  encoder_audio_aac_settings.1.json: |
{{ tpl (.Files.Get "config/unmanic/userdata/encoder_audio_aac/settings.1.json") . | nindent 4 }}
  ignore_under_size_settings.1.json: |
{{ tpl (.Files.Get "config/unmanic/userdata/ignore_under_size/settings.1.json") . | nindent 4 }}
  mover2_settings.1.json: |
{{ tpl (.Files.Get "config/unmanic/userdata/mover2/settings.1.json") . | nindent 4 }}
  video_transcoder_settings.1.json: |
{{ tpl (.Files.Get "config/unmanic/userdata/video_transcoder/settings.1.json") . | nindent 4 }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unmanic-basicauth
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: unmanic-basicauth
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: users
      remoteRef:
        key: senaev-com-kv
        property: UNMANIC_HTPASSWD_HASH_WITH_USERNAME
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: unmanic-basicauth
  namespace: {{ .Release.Namespace }}
spec:
  basicAuth:
    secret: unmanic-basicauth
    removeHeader: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unmanic
  namespace: {{ .Release.Namespace }}
  labels:
    app: unmanic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unmanic
  template:
    metadata:
      labels:
        app: unmanic
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 44
          - 991
      nodeSelector:
        vps: {{ .Values.unmanic.vps }}
      initContainers:
        # hostPath is root-owned until chown; must run before init-config (runs as 1000)
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /config /downloads /tmp/unmanic
              chown -R 1000:1000 /config /downloads /tmp/unmanic
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: cache
              mountPath: /tmp/unmanic
        - name: init-config
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              mkdir -p /config/.unmanic/config /config/.unmanic/userdata/encoder_audio_aac /config/.unmanic/userdata/ignore_under_size /config/.unmanic/userdata/mover2 /config/.unmanic/userdata/video_transcoder
              if [ ! -f /config/.unmanic/config/settings.json ]; then
                cp /default-config/settings.json /config/.unmanic/config/
                cp /default-config/encoder_audio_aac_settings.1.json /config/.unmanic/userdata/encoder_audio_aac/settings.1.json
                cp /default-config/ignore_under_size_settings.1.json /config/.unmanic/userdata/ignore_under_size/settings.1.json
                cp /default-config/mover2_settings.1.json /config/.unmanic/userdata/mover2/settings.1.json
                cp /default-config/video_transcoder_settings.1.json /config/.unmanic/userdata/video_transcoder/settings.1.json
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: default-config
              mountPath: /default-config
              readOnly: true
      containers:
        - name: unmanic
          image: josh5/unmanic:0.4.0.post1
          securityContext:
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: webui
              containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: cache
              mountPath: /tmp/unmanic
            - name: dri
              mountPath: /dev/dri
      volumes:
        - name: config
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.unmanic.volumePath }}/config
            type: DirectoryOrCreate
        - name: cache
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.unmanic.volumePath }}/cache
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: unmanic-default-config
        - name: downloads
          hostPath:
            path: {{ .Values.mediaServerStoragePath }}/{{ .Values.qbittorrent.volumePath }}/downloads
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: unmanic
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: unmanic
  ports:
    - name: webui
      port: 8888
      targetPort: 8888
{{- end }}
