{{- if .Values.redpandaConsole.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redpanda-console-basicauth
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: redpanda-console-basicauth
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: users
      remoteRef:
        key: senaev-com-kv
        property: REDPANDA_CONSOLE_HTPASSWD_HASH_WITH_USERNAME
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redpanda-console-basicauth
  namespace: {{ .Release.Namespace }}
spec:
  basicAuth:
    secret: redpanda-console-basicauth
    removeHeader: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  namespace: {{ .Release.Namespace }}
  labels:
    app: redpanda-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console
  template:
    metadata:
      labels:
        app: redpanda-console
    spec:
      nodeSelector:
        vps: {{ .Values.redpandaConsole.vps }}
      containers:
        - name: redpanda-console
          image: redpandadata/console:v3.4.0
          env:
            - name: KAFKA_BROKERS
              value: redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.kafkaPort }}
            - name: REDPANDA_ADMINAPI_URLS
              value: http://redpanda.{{ .Release.Namespace }}.svc.cluster.local:9644
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /admin/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
{{ toYaml .Values.redpandaConsole.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: redpanda-console
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
