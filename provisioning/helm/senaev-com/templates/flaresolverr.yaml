{{- if and .Values.prowlarr.enabled .Values.prowlarr.flaresolverr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: {{ .Release.Namespace }}
  labels:
    app: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      nodeSelector:
        vps: {{ .Values.prowlarr.vps }}
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
          env:
            - name: LOG_LEVEL
              value: {{ .Values.prowlarr.flaresolverr.logLevel | quote }}
            - name: LOG_HTML
              value: "false"
            - name: CAPTCHA_SOLVER
              value: none
            - name: TZ
              value: Etc/UTC
          ports:
            - name: http
              containerPort: {{ .Values.prowlarr.flaresolverr.port }}
          volumeMounts:
            - name: shared-memory
              mountPath: /dev/shm
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: {{ .Release.Namespace }}
  labels:
    app: flaresolverr
spec:
  type: ClusterIP
  selector:
    app: flaresolverr
  ports:
    - name: http
      port: {{ .Values.prowlarr.flaresolverr.port }}
      targetPort: {{ .Values.prowlarr.flaresolverr.port }}
{{- end }}
