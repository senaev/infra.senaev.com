{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: {{ .Release.Namespace }}
  labels:
    app: redpanda
spec:
  serviceName: redpanda-headless
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      nodeSelector:
        vps: {{ .Values.redpanda.vps }}
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v25.3.10
          command:
            - sh
            - -c
            - |
              rpk redpanda start \
                --mode dev-container \
                --kafka-addr PLAINTEXT://0.0.0.0:{{ .Values.redpanda.kafkaPort }} \
                --advertise-kafka-addr PLAINTEXT://redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.kafkaPort }} \
                --pandaproxy-addr 0.0.0.0:{{ .Values.redpanda.pandaproxyPort }} \
                --advertise-pandaproxy-addr http://redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.pandaproxyPort }} \
                --rpc-addr 0.0.0.0:33145 \
                --advertise-rpc-addr redpanda-0.redpanda-headless.{{ .Release.Namespace }}.svc.cluster.local:33145 \
                --memory {{ .Values.redpanda.memory }} \
                --default-log-level=info
          ports:
            - name: kafka
              containerPort: {{ .Values.redpanda.kafkaPort }}
            - name: http
              containerPort: {{ .Values.redpanda.pandaproxyPort }}
            - name: admin
              containerPort: 9644
            - name: rpc
              containerPort: 33145
          livenessProbe:
            tcpSocket:
              port: {{ .Values.redpanda.kafkaPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.redpanda.kafkaPort }}
            initialDelaySeconds: 20
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.redpanda.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: redpanda
spec:
  clusterIP: None
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: {{ .Values.redpanda.kafkaPort }}
    - name: http
      port: {{ .Values.redpanda.pandaproxyPort }}
    - name: admin
      port: 9644
    - name: rpc
      port: 33145
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: {{ .Release.Namespace }}
  labels:
    app: redpanda
spec:
  type: ClusterIP
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: {{ .Values.redpanda.kafkaPort }}
      targetPort: {{ .Values.redpanda.kafkaPort }}
    - name: http
      port: {{ .Values.redpanda.pandaproxyPort }}
      targetPort: {{ .Values.redpanda.pandaproxyPort }}
    - name: admin
      port: 9644
      targetPort: 9644
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: redpanda
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: redpanda
  endpoints:
    - path: /public_metrics
      port: admin
---
apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-create-topics
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        vps: {{ .Values.redpanda.vps }}
      containers:
        - name: rpk
          image: redpandadata/redpanda:v25.3.10
          command:
            - sh
            - -c
            - |
              {{- range .Values.redpanda.topics }}
              rpk topic create {{ .name }} \
                --brokers redpanda.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.redpanda.kafkaPort }} \
                --partitions {{ .partitions }} \
                --replicas 1 \
                --if-not-exists
              {{- end }}
{{- end }}
