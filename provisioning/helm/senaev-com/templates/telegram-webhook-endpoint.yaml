{{- if .Values.telegramWebhookEndpoint.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegram-webhook-endpoint-scripts
  namespace: {{ .Release.Namespace }}
data:
  package.json: |
{{ .Files.Get "config/telegram-webhook-endpoint/package.json" | indent 4 }}
  index.js: |
{{ .Files.Get "config/telegram-webhook-endpoint/index.js" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: telegram-webhook-endpoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-webhook-endpoint
  template:
    metadata:
      labels:
        app: telegram-webhook-endpoint
    spec:
      nodeSelector:
        vps: {{ .Values.redpanda.vps }}
      initContainers:
        - name: npm-install
          image: node:22-alpine
          command:
            - sh
            - -c
            - cp /scripts/* /app/ && cd /app && npm install
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: app
              mountPath: /app
      containers:
        - name: producer
          image: node:22-alpine
          command:
            - node
            - /app/index.js
          env:
            - name: KAFKA_BROKERS
              value: redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.kafkaPort }}
            - name: KAFKA_TOPIC
              value: {{ (index .Values.redpanda.topics 0).name }}
            - name: WEBHOOK_DOMAIN
              value: {{ .Values.telegramWebhookEndpoint.webhookDomain }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TOKEN_senaev_com_bot
                  optional: false
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: scripts
          configMap:
            name: telegram-webhook-endpoint-scripts
        - name: app
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: telegram-webhook-endpoint
spec:
  type: ClusterIP
  selector:
    app: telegram-webhook-endpoint
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
