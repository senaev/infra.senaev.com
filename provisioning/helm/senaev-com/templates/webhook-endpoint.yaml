{{- if .Values.webhookEndpoint.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: webhook-endpoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-endpoint
  template:
    metadata:
      labels:
        app: webhook-endpoint
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.webhookEndpoint.vps }}
      containers:
        - name: webhook-endpoint
          image: ghcr.io/senaev/webhook-endpoint:latest
          ports:
            - containerPort: 3000
          env:
            - name: KAFKA_BROKERS
              value: redpanda.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.redpanda.kafkaPort }}
            - name: WEBHOOK_DOMAIN
              value: {{ .Values.webhookEndpoint.webhookDomain }}
            - name: TG_TOKEN_SENAEV_COM_BOT
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_TOKEN_SENAEV_COM_BOT
                  optional: false
            - name: ALISA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: ALISA_WEBHOOK_SECRET
                  optional: false
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OPENROUTER_API_KEY
                  optional: false
            - name: SUPABASE_PROJECT_URL
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: SUPABASE_PROJECT_URL
                  optional: false
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: SUPABASE_PUBLISHABLE_KEY
                  optional: false
          resources:
{{ toYaml .Values.webhookEndpoint.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: webhook-endpoint
spec:
  type: ClusterIP
  selector:
    app: webhook-endpoint
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
