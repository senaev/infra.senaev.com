{{- if .Values.webhookEndpoint.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: webhook-endpoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-endpoint
  template:
    metadata:
      labels:
        app: webhook-endpoint
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/service: webhook-endpoint
        tags.datadoghq.com/env: prod
        tags.datadoghq.com/version: latest
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.webhookEndpoint.vps }}
      initContainers:
        - name: fix-prowlarr-config-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /prowlarr-config
              chown -R 1000:1000 /prowlarr-config
              chmod -R u+rwX,g+rwX /prowlarr-config
              bad_paths="$(find /prowlarr-config \( -not -user 1000 -o -not -group 1000 -o -not -perm -u+w \) | head -n 20)"
              if [ -n "$bad_paths" ]; then
                echo "Prowlarr config permissions are still invalid after repair:"
                echo "$bad_paths"
                exit 1
              fi
          volumeMounts:
            - name: prowlarr-config
              mountPath: /prowlarr-config
      containers:
        - name: webhook-endpoint
          image: ghcr.io/senaev/webhook-endpoint:latest
          ports:
            - containerPort: 3000
          env:
            - name: WEBHOOK_DOMAIN
              value: {{ .Values.webhookEndpoint.webhookDomain }}
            - name: TG_CLUSTER_CHAT_ID
              value: {{ .Values.telegramClusterChatId | quote }}
            - name: TG_VPN_SUBSCRIPTION_CHAT_ID
              value: {{ .Values.telegramVpnSubscriptionChatId | quote }}
            - name: OBSIDIAN_TASKS_CHAT_ID
              value: {{ .Values.obsidianTasksChatId | quote }}
            - name: TRICKY_DAD_CHAT_ID
              value: {{ .Values.trickyDadChatId | quote }}
            - name: TG_MEDIA_SERVER_CHAT_ID
              value: {{ .Values.telegramMediaServerChatId | quote }}
            - name: PROWLARR_URL
              value: http://prowlarr:{{ .Values.prowlarr.webuiPort }}
            - name: PROWLARR_CONFIG_FILE
              value: /prowlarr-config/config.xml
            - name: OBSIDIAN_SYNC_URL
              value: "http://obsidian-sync:8080"
            - name: TG_TOKEN_SENAEV_COM_BOT
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_TOKEN_SENAEV_COM_BOT
                  optional: false
            - name: ALISA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: ALISA_WEBHOOK_SECRET
                  optional: false
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OPENROUTER_API_KEY
                  optional: false
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: GROQ_API_KEY
                  optional: false
            - name: SUPABASE_PROJECT_URL
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: SUPABASE_PROJECT_URL
                  optional: false
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: SUPABASE_PUBLISHABLE_KEY
                  optional: false
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: torrent-outbox
              mountPath: /torrent-outbox
            - name: prowlarr-config
              mountPath: /prowlarr-config
              readOnly: true
      volumes:
        - name: torrent-outbox
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.webhookEndpoint.torrentOutboxVolumePath }}
            type: DirectoryOrCreate
        - name: prowlarr-config
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.prowlarr.volumePath }}/config
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-endpoint
  namespace: {{ .Release.Namespace }}
  labels:
    app: webhook-endpoint
spec:
  type: ClusterIP
  selector:
    app: webhook-endpoint
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
