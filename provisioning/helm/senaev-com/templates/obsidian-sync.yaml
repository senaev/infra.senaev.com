{{- if .Values.obsidianSync.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-sync
  namespace: {{ .Release.Namespace }}
  labels:
    app: obsidian-sync
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian-sync
  template:
    metadata:
      labels:
        app: obsidian-sync
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.obsidianSync.vps }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0-uclibc
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 {{ .Values.obsidianSync.containerVaultPath }}
          volumeMounts:
            - name: vault
              mountPath: {{ .Values.obsidianSync.containerVaultPath }}
      containers:
        - name: obsidian-sync
          image: ghcr.io/senaev/obsidian-sync:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OBSIDIAN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OBSIDIAN_AUTH_TOKEN
                  optional: false
            - name: OBSIDIAN_VAULT_NAME
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: OBSIDIAN_VAULT_NAME
                  optional: false
            - name: OBSIDIAN_VAULT_PATH
              value: {{ .Values.obsidianSync.containerVaultPath }}
          volumeMounts:
            - name: vault
              mountPath: {{ .Values.obsidianSync.containerVaultPath }}
      volumes:
        - name: vault
          hostPath:
            path: {{ .Values.clusterRootPath }}/{{ .Values.obsidianSync.volumePath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-sync
  namespace: {{ .Release.Namespace }}
  labels:
    app: obsidian-sync
spec:
  type: ClusterIP
  selector:
    app: obsidian-sync
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
