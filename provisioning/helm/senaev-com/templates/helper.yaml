# Send telegram messages to channel:
# # curl -X POST http://helper.senaev-com.svc.cluster.local/tg -H "Content-Type: text/plain" -d "Hello, world!"
{{- if .Values.helper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helper
  namespace: {{ .Release.Namespace }}
  labels:
    app: helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helper
  template:
    metadata:
      labels:
        app: helper
      annotations:
        secret.reloader.stakater.com/reload: "senaev-com-kv-secrets"
    spec:
      nodeSelector:
        vps: {{ .Values.helper.vps }}
      containers:
        - name: helper
          image: ghcr.io/senaev/helper.senaev.com:latest
          env:
            - name: TOKEN_senaev_com_bot
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TOKEN_senaev_com_bot
                  optional: false
            - name: TG_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: TG_CHANNEL_ID
                  optional: false
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: helper
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: helper
  ports:
    - name: helper
      port: 80
      targetPort: 80
{{- end }}