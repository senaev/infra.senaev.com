{{- if .Values.nextjs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: nextjs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-app
  template:
    metadata:
      labels:
        app: nextjs-app
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/service: nextjs-app
        tags.datadoghq.com/env: prod
        tags.datadoghq.com/version: latest
    spec:
      nodeSelector:
        vps: {{ .Values.nextjs.vps }}
      containers:
        - name: nextjs-app
          image: ghcr.io/senaev/senaev.com:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: NOTES_REMOTE_URL
              value: "http://obsidian-sync:8080"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.nextjs.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: nextjs-app
spec:
  type: ClusterIP
  selector:
    app: nextjs-app
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: nextjs-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: nextjs-app
  endpoints:
    - path: /api/metrics
      targetPort: 3000
{{- end }}
