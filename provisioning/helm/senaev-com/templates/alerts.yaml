apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: senaev-com-alerts
  namespace: telemetry
spec:
  groups:
    - name: node-disk
      rules:
{{- range $rule := list
  (dict "alert" "node-disk-space-low" "mountpoint" "/")
  (dict "alert" "node-media-disk-space-low" "mountpoint" "/mnt/sdb1")
}}
        - alert: {{ $rule.alert }}
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="{{ $rule.mountpoint }}", fstype!="", job="node-exporter"}
              /
              node_filesystem_size_bytes{mountpoint="{{ $rule.mountpoint }}", fstype!="", job="node-exporter"}
            ) < 0.05
          for: 10s
          labels:
            severity: warning
            route: senaev-com-alerts
{{- end }}
    - name: node-connectivity
      rules:
        - alert: node-connectivity-failed-to-node-media
          expr: |
            kube_node_status_condition{node="{{ .Values.mediaServerNodeName }}", condition="Ready", status="true"} != 1
          for: 60s
          labels:
            severity: critical
            route: senaev-com-alerts
