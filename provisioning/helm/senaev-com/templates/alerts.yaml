apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: senaev-com-alerts
  namespace: telemetry
spec:
  groups:
    - name: node-disk
      rules:
        - alert: node-disk-space-low
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/", fstype!="", job="node-exporter"}
              /
              node_filesystem_size_bytes{mountpoint="/", fstype!="", job="node-exporter"}
            ) < 0.50
            and
            node_filesystem_readonly{mountpoint="/", fstype!="", job="node-exporter"} == 0
          for: 10s
          labels:
            severity: warning
            route: senaev-com-alerts
    - name: node-connectivity
      rules:
        - alert: node-connectivity-failed-to-node-yc
          expr: |
            (
              (up{job="node-exporter", namespace="telemetry"} == 0)
              * on(pod, namespace) group_left(node)
              kube_pod_info{namespace="telemetry"}
            )
            and on(node)
            kube_node_labels{label_vps="yc"}
          for: 60s
          labels:
            severity: critical
            route: senaev-com-alerts
