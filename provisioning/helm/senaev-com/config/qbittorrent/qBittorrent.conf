[Application]
FileLogger\Age=1
FileLogger\AgeType=1
FileLogger\Backup=true
FileLogger\DeleteOld=true
FileLogger\Enabled=true
FileLogger\MaxSizeBytes=66560
FileLogger\Path=/config/qBittorrent/logs

[AutoRun]
OnTorrentAdded\Enabled=true
; sh /scripts/tg-notify.sh "torrent_added|%N|%L|%G|%F|%R|%D|%C|%Z|%T"
OnTorrentAdded\Program="sh /scripts/tg-notify.sh \"torrent_added|%N|%L|%G|%F|%R|%D|%C|%Z|%T\""
enabled=true
; sh /scripts/tg-notify.sh "torrent_finished|%N|%L|%G|%F|%R|%D|%C|%Z|%T"
program="sh /scripts/tg-notify.sh \"torrent_finished|%N|%L|%G|%F|%R|%D|%C|%Z|%T\""

[BitTorrent]
Session\AddTorrentStopped=false
Session\DefaultSavePath={{ .Values.qbittorrent.paths.completed }}
Session\ExcludedFileNames=
Session\FinishedTorrentExportDirectory={{ .Values.qbittorrent.paths.archiveTorrents }}
Session\GlobalMaxSeedingMinutes=1
Session\Port={{ .Values.qbittorrent.torrentPort }}
Session\QueueingSystemEnabled=true
Session\SSL\Port=49098
Session\ShareLimitAction=Remove
Session\TempPath={{ .Values.qbittorrent.paths.incomplete }}/
Session\TempPathEnabled=true

[Core]
AutoDeleteAddedTorrentFile=Never

[LegalNotice]
Accepted=true

[Meta]
MigrationVersion=8

[Network]
PortForwardingEnabled=false
Proxy\HostnameLookupEnabled=false
Proxy\Profiles\BitTorrent=true
Proxy\Profiles\Misc=true
Proxy\Profiles\RSS=true

[Preferences]
Connection\PortRangeMin={{ .Values.qbittorrent.torrentPort }}
Connection\UPnP=false
Downloads\SavePath=/downloads/
Downloads\TempPath={{ .Values.qbittorrent.paths.incomplete }}/
General\Locale=en
MailNotification\req_auth=true
WebUI\Address=*
WebUI\AuthSubnetWhitelist=@Invalid()
WebUI\Port={{ .Values.qbittorrent.webuiPort }}
WebUI\ServerDomains=*

[RSS]
AutoDownloader\DownloadRepacks=true
AutoDownloader\SmartEpisodeFilter=s(\\d+)e(\\d+), (\\d+)x(\\d+), "(\\d{4}[.\\-]\\d{1,2}[.\\-]\\d{1,2})", "(\\d{1,2}[.\\-]\\d{1,2}[.\\-]\\d{4})"
