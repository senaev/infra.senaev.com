apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: telegram-test-alert
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: telegram-test
      rules:
        - alert: TelegramTestAlert
          expr: vector(1)
          for: 1m
          labels:
            severity: info
            channel: telegram
          annotations:
            summary: "Telegram test alert"
            description: "This test alert verifies the Alertmanager to Telegram delivery path."
