# TODO: Remove duplications using helmfile
userRootPath: /root

nextjs:
  enabled: true
  vps: hetzner

webdav:
  enabled: true
  volumePath: k3s-cluster/volumes/webdav
  vps: hetzner

xray:
  enabled: true
  vps: yandex-cloud

testEcho:
  enabled: true
  vps: hetzner

ingress:
  className: traefik
  tls:
    hosts:
      - senaev.com
      - senaev.ru
      - webdav.senaev.com
      - test.senaev.com
  hosts:
    - host: senaev.com
      service: nextjs-app
      port: 3000
    - host: senaev.ru
      service: nextjs-app
      port: 3000
    - host: webdav.senaev.com
      service: webdav
      port: 80
    - host: test.senaev.com
      service: test-echo
      port: 80

