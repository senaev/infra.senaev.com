name: Update Helm Charts

on:
  push:
    branches: [main, master]
    paths:
      - 'provisioning/helm/**'

jobs:
  update-charts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ['datadog', 'external-secrets', 'senaev-com', 'traefik', 'vault', 'vm-operator', 'vm-stack']
        include:
          - chart: datadog
            namespace: datadog
          - chart: external-secrets
            namespace: external-secrets
          - chart: senaev-com
            namespace: senaev-com
          - chart: traefik
            namespace: traefik
          - chart: vault
            namespace: vault
          - chart: vm-operator
            namespace: telemetry
          - chart: vm-stack
            namespace: telemetry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: provisioning/helm/${{ matrix.chart }}/**

      - name: Sync provisioning to server
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          source: "provisioning/"
          target: "/k3s-cluster/"

      - name: Update chart
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          script: |
            set -e
            /k3s-cluster/provisioning/control-plane/upgrade-namespace.sh ${{ matrix.chart }} ${{ matrix.namespace }}

      - name: Notify Telegram
        if: always() && steps.changed-files.outputs.any_changed == 'true'
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="❌"
          fi

          TEXT="${STATUS_ICON} Helm chart ${{ matrix.chart }} <a href=\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">update</a>"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=-1003971743999" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
