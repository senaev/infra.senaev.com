name: webhook-endpoint

on:
  push:
    branches: [main, master]
    paths:
      - "webhook-endpoint/**"
  workflow_dispatch:

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-service.yml
    with:
      workflow_title: webhook-endpoint
      context: ./webhook-endpoint
      registry_image: ghcr.io/senaev/webhook-endpoint
      deployment_name: webhook-endpoint
    secrets: inherit
