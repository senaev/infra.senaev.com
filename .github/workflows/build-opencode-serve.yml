name: opencode-serve

on:
  push:
    branches: [main, master]
    paths:
      - "opencode-serve/**"
  workflow_dispatch:

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-service.yml
    with:
      workflow_title: opencode-serve
      context: ./opencode-serve
      registry_image: ghcr.io/senaev/opencode-serve
      deployment_name: opencode-telegram
    secrets: inherit
