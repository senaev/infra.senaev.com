name: Build Cluster Helper

on:
  push:
    branches: [main, master]
    paths:
      - 'cluster-helper/**'
  workflow_dispatch:

env:
  IMAGE_NAME: cluster-helper
  REGISTRY_IMAGE: ghcr.io/senaev/cluster-helper

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./cluster-helper
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="finished successfully"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="failed"
          fi

          TEXT="${STATUS_ICON} ${GITHUB_WORKFLOW} ${STATUS_TEXT}
          Image: ${REGISTRY_IMAGE}:latest
          Repo: ${GITHUB_REPOSITORY}
          Ref: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_CLUSTER_CHAT_ID }}" \
            --data-urlencode "text=${TEXT}"
